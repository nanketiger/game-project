<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>完美平台碰撞·不抽搐版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #87CEEB; height: 100vh; overflow: hidden; }
        #player {
            width: 30px;
            height: 50px;
            background: #ff6347;
            position: absolute;
            border-radius: 5px;
        }
        .bullet {
            width: 8px; height: 8px; background: #000; border-radius: 50%;
            position: absolute;
        }
        .ground {
            width: 100%; height: 100px; background: #567D46;
            position: absolute; bottom: 0;
        }
        .platform {
            background: #8B4513;
            position: absolute;
            border-radius: 4px;
        }
        .monster {
            width: 60px; /* 角色的两倍宽 */
            height: 100px; /* 角色的两倍高 */
            background: #9400D3; /* 紫色怪物 */
            position: absolute;
            border-radius: 5px;
        }
        .portal {
            width: 80px;
            height: 120px;
            background: linear-gradient(45deg, #8A2BE2, #4B0082);
            position: absolute;
            border-radius: 40px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
        }
        #health {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="player"></div>
    <div class="ground"></div>
    <div id="health">血量: 3</div>

    <script>
        const player = document.getElementById('player');
        const groundHeight = 100;

        let x = 200;
        let y = 0;
        const speed = 5;
        const jumpPower = 10;
        let vy = 0;
        const gravity = 0.25;
        let isOnGround = false;

        let faceDir = 1;
        const keys = {};
        let lastShootTime = 0;
        const shootCooldown = 1000; // 1秒冷却时间

        // 角色血量系统
        let playerHealth = 3;
        const maxHealth = 3;
        let lastDamageTime = 0;
        const damageCooldown = 1000; // 1秒伤害冷却

        let platforms = [];
        const platformCount = 8;

        // 怪物相关变量
        let monster = null;
        let monsterX = 0;
        let monsterY = 0;
        let monsterSpeed = 2;
        let monsterDirection = -1; // -1向左，1向右
        let monsterHealth = 5;

        // 传送门相关变量
        let portal = null;
        let portalX = 0;
        let portalY = 0;

        // 生成随机平台
        function createPlatforms() {
            for (let i = 0; i < platformCount; i++) {
                const w = 70 + Math.random() * 80;
                const px = Math.random() * (window.innerWidth - w);
                const py = groundHeight + 70 + Math.random() * 400;
                const h = 15;

                const plat = document.createElement('div');
                plat.className = 'platform';
                plat.style.width = w + 'px';
                plat.style.height = h + 'px';
                plat.style.left = px + 'px';
                plat.style.bottom = py + 'px';
                document.body.appendChild(plat);

                platforms.push({ x: px, y: py, w: w, h });
            }
        }

        // 创建怪物
        function createMonster() {
            // 确保怪物元素被正确创建
            monster = document.createElement('div');
            monster.className = 'monster';
            // 在场景最右边生成
            monsterX = window.innerWidth - 60; // 怪物宽度60
            monsterY = groundHeight; // 站在地面上
            monster.style.left = monsterX + 'px';
            monster.style.bottom = monsterY + 'px';
            // 确保怪物被添加到DOM中
            document.body.appendChild(monster);
            // 控制台输出怪物信息，用于调试
            console.log('Created monster with health:', monsterHealth);
        }

        // 创建传送门
        function createPortal() {
            portal = document.createElement('div');
            portal.className = 'portal';
            // 在屏幕正中间生成
            portalX = (window.innerWidth - 80) / 2; // 传送门宽度80
            portalY = groundHeight + 100; // 地面上方100px
            portal.style.left = portalX + 'px';
            portal.style.bottom = portalY + 'px';
            document.body.appendChild(portal);
        }

        // 清除所有平台
        function clearPlatforms() {
            const platformElements = document.querySelectorAll('.platform');
            platformElements.forEach(plat => plat.remove());
            platforms = [];
        }

        // 刷新地图
        function refreshMap() {
            // 清除平台和传送门
            clearPlatforms();
            if (portal) {
                portal.remove();
                portal = null;
            }
            
            // 清除旧怪物
            if (monster) {
                monster.remove();
                monster = null;
            }
            
            // 重新生成平台
            createPlatforms();
            
            // 生成新怪物，血量为上一个的两倍
            monsterHealth *= 2;
            // 重置怪物方向
            monsterDirection = -1; // 向左移动
            // 重置怪物位置
            monsterX = 0;
            monsterY = 0;
            createMonster();
        }

        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
        });
        document.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        // 射击
        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'j') shoot();
        });

        function shoot() {
            const currentTime = Date.now();
            // 检查是否在冷却期内
            if (currentTime - lastShootTime < shootCooldown) {
                return;
            }
            
            lastShootTime = currentTime;
            
            const b = document.createElement('div');
            b.className = 'bullet';
            b.style.left = x + 15 + 'px';
            b.style.bottom = groundHeight + y + 25 + 'px';
            document.body.appendChild(b);

            const bulletSpeed = 8 * faceDir;
            function move() {
                if (!b.parentNode) return;
                let l = parseFloat(b.style.left);
                l += bulletSpeed;
                b.style.left = l + 'px';
                
                // 检查子弹是否击中怪物
                if (monster && monsterHealth > 0) {
                    // 确保怪物元素存在
                    if (monster.parentNode) {
                        const bulletRect = b.getBoundingClientRect();
                        const monsterRect = monster.getBoundingClientRect();
                        
                        if (
                            bulletRect.left < monsterRect.right &&
                            bulletRect.right > monsterRect.left &&
                            bulletRect.top < monsterRect.bottom &&
                            bulletRect.bottom > monsterRect.top
                        ) {
                            // 击中怪物
                            monsterHealth--;
                            console.log('Monster hit! Health:', monsterHealth);
                            b.remove(); // 移除子弹
                            
                            // 检查怪物是否死亡
                            if (monsterHealth <= 0) {
                                console.log('Monster killed!');
                                monster.remove();
                                monster = null;
                                createPortal();
                            }
                            return;
                        }
                    }
                }
                
                if (l < 0 || l > innerWidth) b.remove();
                else requestAnimationFrame(move);
            }
            move();
        }

        function updateHealthDisplay() {
            const healthElement = document.getElementById('health');
            healthElement.textContent = `血量: ${playerHealth}`;
        }

        function loop() {
            // 左右移动
            if (keys.a) { x -= speed; faceDir = -1; }
            if (keys.d) { x += speed; faceDir = 1; }

            // 水平边界检查
            const playerWidth = 30;
            if (x < 0) {
                x = 0;
            } else if (x > window.innerWidth - playerWidth) {
                x = window.innerWidth - playerWidth;
            }

            // 跳跃
            if (keys.k && isOnGround) {
                vy = jumpPower;
                isOnGround = false;
            }

            // 重力
            vy -= gravity;
            y += vy;

            // 地面碰撞
            if (y <= 0) {
                y = 0;
                vy = 0;
                isOnGround = true;
            }

            const playerLeft = x;
            const playerRight = x + 30;
            const playerBottom = groundHeight + y;
            const playerTop = playerBottom + 50;

            // 平台碰撞（修复抽搐和下方跳跃）
            let onPlatform = false;
            for (const plat of platforms) {
                const platLeft = plat.x;
                const platRight = plat.x + plat.w;
                const platTop = plat.y + plat.h;
                const platBottom = plat.y;

                // 计算玩家实际位置
                const playerActualBottom = groundHeight + y;
                const playerActualTop = playerActualBottom + 50;

                // 检查是否站在平台上
                if (
                    playerRight > platLeft &&
                    playerLeft < platRight &&
                    playerActualTop >= platTop &&
                    playerActualBottom <= platTop &&
                    vy <= 0
                ) {
                    // 精确设置玩家位置，避免抽搐
                    y = platTop - groundHeight;
                    vy = 0;
                    onPlatform = true;
                }
            }

            // 只有在地面或平台上时才设置isOnGround为true
            if (y <= 0 || onPlatform) {
                isOnGround = true;
            } else {
                isOnGround = false;
            }

            // 怪物移动逻辑
            if (monster) {
                // 确保怪物Health值正确
                if (monsterHealth > 0) {
                    // 左右移动
                    monsterX += monsterSpeed * monsterDirection;
                    
                    // 边界检测，碰到边界回头
                    if (monsterX <= 0) {
                        monsterX = 0;
                        monsterDirection = 1; // 向右
                    } else if (monsterX >= window.innerWidth - 60) { // 怪物宽度60
                        monsterX = window.innerWidth - 60;
                        monsterDirection = -1; // 向左
                    }
                    
                    // 渲染怪物
                    monster.style.left = monsterX + 'px';
                    
                    // 角色与怪物碰撞检测
                    const playerRect = player.getBoundingClientRect();
                    const monsterRect = monster.getBoundingClientRect();
                    
                    if (
                        playerRect.left < monsterRect.right &&
                        playerRect.right > monsterRect.left &&
                        playerRect.top < monsterRect.bottom &&
                        playerRect.bottom > monsterRect.top
                    ) {
                        // 检查是否在伤害冷却期内
                        const currentTime = Date.now();
                        if (currentTime - lastDamageTime >= damageCooldown) {
                            // 扣除血量
                            playerHealth = Math.max(0, playerHealth - 1);
                            lastDamageTime = currentTime;
                            updateHealthDisplay();
                        }
                    }
                }
            }

            // 传送门碰撞检测
            if (portal) {
                const playerRect = player.getBoundingClientRect();
                const portalRect = portal.getBoundingClientRect();
                
                if (
                    playerRect.left < portalRect.right &&
                    playerRect.right > portalRect.left &&
                    playerRect.top < portalRect.bottom &&
                    playerRect.bottom > portalRect.top
                ) {
                    // 触碰传送门，刷新地图
                    refreshMap();
                }
            }

            // 渲染
            player.style.left = x + 'px';
            player.style.bottom = groundHeight + y + 'px';

            requestAnimationFrame(loop);
        }

        createPlatforms();
        createMonster();
        loop();
    </script>
</body>
</html>
